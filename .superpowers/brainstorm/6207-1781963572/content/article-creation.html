<h2>创建文章流程</h2>
<p class="subtitle">新建文章对话框，增加示例文章和模板选择</p>

<div class="mockup" style="max-width: 520px; margin: 0 auto;">
  <div class="mockup-header">新建文章</div>
  <div class="mockup-body" style="padding: 20px; text-align: left;">

    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: #666; margin-bottom: 4px;">标题 *</div>
      <input class="mock-input" placeholder="文章标题" style="width: 100%;">
    </div>

    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: #666; margin-bottom: 4px;">示例文章</div>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <span style="padding: 4px 12px; border: 2px solid #3b82f6; border-radius: 20px; font-size: 13px; background: #eff6ff; cursor: pointer;">产品评测文</span>
        <span style="padding: 4px 12px; border: 1px solid #d1d5db; border-radius: 20px; font-size: 13px; cursor: pointer;">新闻资讯</span>
        <span style="padding: 4px 12px; border: 1px solid #d1d5db; border-radius: 20px; font-size: 13px; cursor: pointer;">活动宣传</span>
        <span style="padding: 4px 12px; border: 1px solid #d1d5db; border-radius: 20px; font-size: 13px; cursor: pointer;">教程指南</span>
        <span style="padding: 4px 12px; border: 1px dashed #d1d5db; border-radius: 20px; font-size: 12px; color: #999; cursor: pointer;">空白</span>
      </div>
    </div>

    <div style="margin-bottom: 20px;">
      <div style="font-size: 12px; color: #666; margin-bottom: 4px;">应用模板（可选）</div>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <span style="padding: 4px 12px; border: 2px solid #10b981; border-radius: 20px; font-size: 13px; background: #ecfdf5; cursor: pointer;">简约风格</span>
        <span style="padding: 4px 12px; border: 1px solid #d1d5db; border-radius: 20px; font-size: 13px; cursor: pointer;">商务风</span>
        <span style="padding: 4px 12px; border: 1px solid #d1d5db; border-radius: 20px; font-size: 13px; cursor: pointer;">文艺风</span>
        <span style="padding: 4px 12px; border: 1px dashed #d1d5db; border-radius: 20px; font-size: 12px; color: #999; cursor: pointer;">不选</span>
      </div>
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #e5e7eb; padding-top: 16px;">
      <button class="mock-button" style="background: white; color: #333;">取消</button>
      <button class="mock-button" style="background: #3b82f6; color: white;">创建并编辑</button>
    </div>

  </div>
</div>

<div class="section" style="margin-top: 24px;">
  <h3>创建时的数据流</h3>
  <div style="background: #f8fafc; padding: 16px; border-radius: 8px; font-size: 14px; line-height: 1.7; text-align: left;">
    <strong>选了示例 + 选了模板：</strong><br>
    ① 克隆示例文章的 Document → ② 遍历文章模块，按 <code>module.type</code> 匹配模板中同名模块 → ③ 合并模板该模块的 <code>styles</code> 到文章模块<br><br>
    <strong>只选示例：</strong><br>
    直接使用示例文章的 Document（含默认样式）<br><br>
    <strong>只选模板：</strong><br>
    克隆模板的 Document 作为内容起点<br><br>
    <strong>都不选（空白）：</strong><br>
    创建一个空容器 Document
  </div>
</div>
