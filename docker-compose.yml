services:
  backend:
    build:
      context: ./backend
    container_name: wechat-printer-backend
    restart: unless-stopped
    ports:
      - "5231:5231"
    environment:
      - PORT=5231
      - DB_PATH=/data/layouts.db
      - UPLOAD_DIR=/data/uploads
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-}
      - LLM_MODEL=${LLM_MODEL:-}
    volumes:
      - /data/wechat-printer:/data
    networks:
      - wechat-network

  frontend:
    build:
      context: ./frontend
    container_name: wechat-printer-frontend
    restart: unless-stopped
    ports:
      - "5230:3000"
    depends_on:
      - backend
    networks:
      - wechat-network

networks:
  wechat-network:
    driver: bridge
